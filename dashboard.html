<!DOCTYPE html>
<html>
<head>
  <title>Job Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div>Job Application Tracker</div>
  <button onclick="logout()" class="logout-btn">Logout</button>
</div>

<div class="container">

  <div class="card">
    <h2>Add Job</h2>

    <input id="company" placeholder="Company">
    <input id="role" placeholder="Role">
    <input type="date" id="date">

    <select id="status">
      <option>APPLIED</option>
      <option>INTERVIEW</option>
      <option>REJECTED</option>
      <option>OFFER</option>
    </select>

    <input id="notes" placeholder="Notes">

    <button onclick="addJob()">Add Job</button>
  </div>

  <div class="card">
    <h2>Your Applications</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Company</th>
          <th>Role</th>
          <th>Status</th>
          <th>Delete</th>
        </tr>
      </thead>

      <tbody id="jobsTable"></tbody>
    </table>
  </div>

</div>

<script>
console.log("JS STARTED");

document.addEventListener("DOMContentLoaded", () => {

  console.log("DOM READY");

  const userId = localStorage.getItem("userId");

  if (!userId) {
    console.log("No userId → redirect");
    window.location.href = "index.html";
    return;
  }

  loadJobs(userId);
});

function loadJobs(userId) {

  console.log("Loading jobs for:", userId);

  fetch("https://jobtracker-4w3y.onrender.com/applications/" + userId)
  .then(res => res.json())
  .then(data => {

    console.log("Data:", data);

    const table = document.getElementById("jobsTable");

    if (!table) {
      console.error("Table not found");
      return;
    }

    table.innerHTML = "";

    data.forEach(job => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${job.id}</td>
        <td>${job.companyName}</td>
        <td>${job.jobRole}</td>
        <td>${job.status}</td>
      `;

      table.appendChild(row);
    });

  })
  .catch(err => {
    console.error("API ERROR:", err);
  });
}
</script>


</body>
</html>
