<!DOCTYPE html>
<html>
<head>
<title>Job Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">

<div class="nav-left">
Job Application Tracker
</div>

<div class="nav-right">
<button onclick="logout()" class="logout-btn">Logout</button>
</div>

</div>


<div class="container">

<div class="card">

<h2>Add Job</h2>

<input id="companyName" placeholder="Company">

<input id="jobRole" placeholder="Role">

<input type="date" id="applicationDate">

<select id="status">
<option value="APPLIED">Applied</option>
<option value="INTERVIEW">Interview</option>
<option value="REJECTED">Rejected</option>
<option value="OFFER">Offer</option>
</select>

<input id="notes" placeholder="Notes">

<button onclick="addJob()" class="add-btn">Add Job</button>

</div>


<div class="card">

<h2>Your Applications</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Company</th>
<th>Role</th>
<th>Status</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="jobTable"></tbody>

</table>

</div>

</div>


<script>

const API="https://jobtracker-4w3y.onrender.com"

if(!localStorage.getItem("username")){
window.location.href="index.html"
}

async function loadJobs(){

const res=await fetch(API+"/applications")

const jobs=await res.json()

const table=document.getElementById("jobTable")

table.innerHTML=""

jobs.forEach(job=>{

table.innerHTML+=`
<tr>
<td>${job.id}</td>
<td>${job.companyName}</td>
<td>${job.jobRole}</td>
<td>${job.status}</td>
<td>
<button onclick="deleteJob(${job.id})" class="delete-btn">Delete</button>
</td>
</tr>
`

})

}
async function addJob(){

const companyName=document.getElementById("companyName").value
const jobRole=document.getElementById("jobRole").value
const applicationDate=document.getElementById("applicationDate").value
const status=document.getElementById("status").value
const notes=document.getElementById("notes").value

await fetch("https://jobtracker-4w3y.onrender.com/applications",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
companyName:companyName,
jobRole:jobRole,
applicationDate:applicationDate,
status:status,
notes:notes
})

})

loadJobs()

}

async function deleteJob(id){

await fetch(API+"/applications/"+id,{
method:"DELETE"
})

loadJobs()

}

function logout(){

localStorage.removeItem("username")

window.location.href="index.html"

}

loadJobs()

</script>

</body>
</html>
