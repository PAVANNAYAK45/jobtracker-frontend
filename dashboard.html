<!DOCTYPE html>
<html>
<head>
  <title>Job Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <div>Job Application Tracker</div>
  <button onclick="logout()" class="logout-btn">Logout</button>
</div>

<div class="container">

  <div class="card">
    <h2>Add Job</h2>

    <input id="company" placeholder="Company">
    <input id="role" placeholder="Role">
    <input type="date" id="date">

    <select id="status">
      <option>APPLIED</option>
      <option>INTERVIEW</option>
      <option>REJECTED</option>
      <option>OFFER</option>
    </select>

    <input id="notes" placeholder="Notes">

    <button onclick="addJob()">Add Job</button>
  </div>

  <div class="card">
    <h2>Your Applications</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Company</th>
          <th>Role</th>
          <th>Status</th>
          <th>Delete</th>
        </tr>
      </thead>

      <tbody id="jobsTable"></tbody>
    </table>
  </div>

</div>

<script>
const API = "https://jobtracker-4w3y.onrender.com";
const userId = localStorage.getItem("userId");

if (!userId) {
  window.location.href = "index.html";
}

function loadJobs() {
  fetch(`${API}/applications/${userId}`)
  .then(res => res.json())
  .then(data => {

    const table = document.getElementById("jobsTable");
    table.innerHTML = "";

    data.forEach(job => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${job.id}</td>
        <td>${job.companyName}</td>
        <td>${job.jobRole}</td>
        <td>${job.status}</td>
        <td><button class="delete-btn" onclick="deleteJob(${job.id})">Delete</button></td>
      `;

      table.appendChild(row);
    });
  });
}

function addJob() {

  const company = document.getElementById("company").value;
  const role = document.getElementById("role").value;
  const date = document.getElementById("date").value;
  const status = document.getElementById("status").value;
  const notes = document.getElementById("notes").value;

  fetch(`${API}/applications/${userId}`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      companyName: company,
      jobRole: role,
      applicationDate: date,
      status: status,
      notes: notes
    })
  }).then(() => {
    loadJobs();
  });
}

function deleteJob(id) {
  fetch(`${API}/applications/${id}`, {
    method: "DELETE"
  }).then(() => loadJobs());
}

function logout() {
  localStorage.removeItem("userId");
  window.location.href = "index.html";
}

loadJobs();
</script>

</body>
</html>
