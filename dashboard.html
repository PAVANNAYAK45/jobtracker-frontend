<!DOCTYPE html>
<html>
<head>
<title>Job Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">

Job Application Tracker

</div>

<div class="dashboard">

<div class="card">

<h3>Add Job</h3>

<input id="company" placeholder="Company">

<input id="role" placeholder="Role">

<input id="date" type="date">

<input id="notes" placeholder="Notes">

<button onclick="addJob()">Add Job</button>

</div>

<div class="card">

<h3>Your Applications</h3>

<table>

<thead>

<tr>
<th>ID</th>
<th>Company</th>
<th>Role</th>
<th>Status</th>
<th>Delete</th>
</tr>

</thead>

<tbody id="jobs"></tbody>

</table>

</div>

</div>

<script>

const API="https://jobtracker-4w3y.onrender.com"
const username=localStorage.getItem("username")

async function addJob(){

await fetch(API+"/applications/"+username,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

companyName:document.getElementById("company").value,
jobRole:document.getElementById("role").value,
applicationDate:document.getElementById("date").value,
status:"APPLIED",
notes:document.getElementById("notes").value

})

})

loadJobs()

}

async function loadJobs(){

const res=await fetch(API+"/applications/"+username)

const jobs=await res.json()

const table=document.getElementById("jobs")

table.innerHTML=""

jobs.forEach(j=>{

table.innerHTML+=`

<tr>

<td>${j.id}</td>
<td>${j.companyName}</td>
<td>${j.jobRole}</td>
<td>${j.status}</td>

<td>
<button class="delete" onclick="deleteJob(${j.id})">
Delete
</button>
</td>

</tr>

`

})

}

async function deleteJob(id){

await fetch(API+"/applications/"+id,{
method:"DELETE"
})

loadJobs()

}

loadJobs()

</script>

</body>
</html>
