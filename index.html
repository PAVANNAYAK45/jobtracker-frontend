<!DOCTYPE html>
<html>
<head>
<title>Job Tracker</title>
</head>

<body>

<h2>Register</h2>

<input id="regUser" placeholder="username">
<input id="regPass" placeholder="password">
<button onclick="register()">Register</button>

<h2>Login</h2>

<input id="loginUser" placeholder="username">
<input id="loginPass" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<h2>Add Job</h2>

<input id="company">
<input id="role">
<input id="date">
<input id="notes">

<button onclick="addJob()">Add</button>

<h2>Jobs</h2>

<ul id="jobs"></ul>

<script>

const API="https://jobtracker-4w3y.onrender.com"

let currentUser=""

async function register(){

await fetch(API+"/auth/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:document.getElementById("regUser").value,
password:document.getElementById("regPass").value

})

})

alert("registered")
}

async function login(){

const res=await fetch(API+"/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:document.getElementById("loginUser").value,
password:document.getElementById("loginPass").value

})

})

const user=await res.json()

currentUser=user.username

loadJobs()
}

async function addJob(){

await fetch(API+"/applications/"+currentUser,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

companyName:document.getElementById("company").value,
jobRole:document.getElementById("role").value,
applicationDate:document.getElementById("date").value,
status:"APPLIED",
notes:document.getElementById("notes").value

})

})

loadJobs()
}

async function loadJobs(){

const res=await fetch(API+"/applications/"+currentUser)

const jobs=await res.json()

const list=document.getElementById("jobs")

list.innerHTML=""

jobs.forEach(j=>{

list.innerHTML+=`<li>${j.companyName} ${j.jobRole}</li>`

})

}

</script>

</body>
</html>
